# @package _global_
tune_mode: true

defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe

hydra:
  sweeper:
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      consider_prior: true
    direction: maximize
    study_name: robust_har_optimization
    storage: null
    n_trials: 20
    n_jobs: 1
    params:
      lr: choice(0.01, 0.005, 0.001, 0.0005, 0.0001)
      batch_size: choice(32, 64, 128)
      weight_decay: choice(0.0, 0.0001, 0.001, 0.01)
      aux_weight: choice(0.0, 0.2, 0.4, 0.5)
